<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">

  <!-- PWA / iOS -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Orbit">

  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <title>Orbit</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="app">

  <!-- ── Loading screen ── -->
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">載入中…</div>
  </div>

  <!-- ── Login screen ── -->
  <div id="login-screen" class="hidden">
    <div class="setup-logo">🚀</div>
    <div class="setup-title">Orbit</div>
    <div class="setup-subtitle">記錄你的每一步成長</div>

    <div class="auth-card">
      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin" onclick="window.switchAuthTab('signin')">登入</button>
        <button class="auth-tab" id="tab-signup" onclick="window.switchAuthTab('signup')">註冊</button>
      </div>

      <!-- Email + password form -->
      <form id="auth-form">
        <div class="form-group">
          <label class="form-label">電子郵件</label>
          <input class="form-input" id="auth-email" type="email"
                 placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">密碼</label>
          <input class="form-input" id="auth-password" type="password"
                 placeholder="至少 6 個字元" required autocomplete="current-password" minlength="6">
        </div>
        <div id="auth-error" class="auth-error hidden"></div>
        <button type="submit" class="btn btn-primary" id="auth-submit">登入</button>
      </form>

      <div class="auth-divider"><span>或</span></div>

      <!-- Google -->
      <button class="btn btn-google" id="btn-google" onclick="window.loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        用 Google 帳號登入
      </button>
    </div>

    <!-- Guest mode -->
    <button class="btn-guest" onclick="window.continueAsGuest()">以遊客身份繼續（資料僅存本機）</button>
  </div>

  <!-- ── Setup screen (first launch) ── -->
  <div id="setup-screen" class="hidden">
    <div class="setup-logo">🚀</div>
    <div class="setup-title">Yoyo 成長監控</div>
    <div class="setup-subtitle">開始記錄你的每一步成長</div>

    <div class="setup-avatar-area">
      <div class="setup-avatar-circle" id="setup-avatar-preview">👤</div>
      <button type="button" class="btn btn-outline btn-sm" id="setup-avatar-btn">上傳頭像（選填）</button>
      <input type="file" id="setup-avatar-input" accept="image/*" style="display:none">
    </div>

    <form id="setup-form" style="width:100%">
      <div class="form-group">
        <label class="form-label">你的名字</label>
        <input class="form-input" id="setup-name" placeholder="Yoyo" maxlength="20" required autocomplete="name">
      </div>
      <button type="submit" class="btn btn-primary">開始成長！🎯</button>
    </form>
  </div>

  <!-- ── Main app ── -->
  <div id="main-app" class="hidden">

    <!-- Header: level + XP bar -->
    <header id="header">
      <div class="hdr-level-badge" onclick="window.navigate('profile')">
        <span class="hdr-lv-label">Lv.</span><span id="hdr-level">1</span>
      </div>
      <div class="hdr-xp-section">
        <div class="hdr-xp-top">
          <span id="hdr-title" class="hdr-title">初心者</span>
          <span id="hdr-xp-text" class="hdr-xp-text">0 / 120 XP</span>
        </div>
        <div class="xp-bar-track">
          <div class="xp-bar-fill" id="hdr-xp-fill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main id="content"></main>

    <!-- Bottom navigation (5 tabs) -->
    <nav id="nav">
      <button class="nav-item active" data-page="home" onclick="window.navigate('home')">
        <span class="nav-icon">🏠</span>今日
      </button>
      <button class="nav-item" data-page="goals" onclick="window.navigate('goals')">
        <span class="nav-icon">📋</span>紀錄
      </button>
      <button class="nav-item" data-page="review" onclick="window.navigate('review')">
        <span class="nav-icon">📊</span>週回顧
      </button>
      <button class="nav-item" data-page="profile" onclick="window.navigate('profile')">
        <span class="nav-icon">👤</span>個人
      </button>
      <button class="nav-item" data-page="settings" onclick="window.navigate('settings')">
        <span class="nav-icon">⚙️</span>設定
      </button>
    </nav>
  </div>

  <!-- ── Focus timer overlay ── -->
  <div id="focus-overlay" class="hidden">
    <div class="focus-box">
      <div class="focus-task-header">
        <span id="focus-task-emoji" class="focus-task-emoji">🎯</span>
        <span id="focus-task-name" class="focus-task-name">任務名稱</span>
      </div>
      <div id="focus-timer" class="focus-timer">00:00</div>
      <div id="focus-min-effective" class="focus-min-pending">最低有效時間計算中…</div>
      <button id="focus-end-btn" class="btn btn-primary focus-end-btn" onclick="window.endFocus()">
        結束專注
      </button>
    </div>
  </div>

  <!-- ── Level-up overlay ── -->
  <div id="levelup-overlay" class="hidden">
    <div class="levelup-box">
      <div class="lu-stars">✨⭐✨</div>
      <div class="lu-label">LEVEL UP！</div>
      <div class="lu-number" id="lu-level">2</div>
      <div class="lu-title" id="lu-title">探索者</div>
      <button class="btn btn-primary" onclick="window.closeLevelUp()" style="margin-top:24px;max-width:200px">繼續前進 🚀</button>
    </div>
  </div>

</div>

<script type="module" src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
