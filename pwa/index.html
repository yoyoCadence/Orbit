<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">

  <!-- PWA / iOS -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Orbit">

  <title>Orbit</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="app">

  <!-- ── Loading screen ── -->
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">載入中…</div>
  </div>

  <!-- ── Login screen ── -->
  <div id="login-screen" class="hidden">
    <div class="setup-logo">🚀</div>
    <div class="setup-title">Orbit</div>
    <div class="setup-subtitle">登入以同步你的成長紀錄</div>

    <form id="login-form" style="width:100%;max-width:360px">
      <div class="form-group">
        <label class="form-label">電子郵件</label>
        <input class="form-input" id="login-email" type="email"
               placeholder="your@email.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary">發送登入連結</button>
    </form>

    <div id="login-sent" class="hidden" style="text-align:center;padding:24px 0">
      <div style="font-size:48px;margin-bottom:12px">📧</div>
      <p style="color:var(--text-muted);line-height:1.7">
        登入連結已發送！<br>請檢查你的 email，點擊連結即可進入。
      </p>
    </div>
  </div>

  <!-- ── Setup screen (first launch) ── -->
  <div id="setup-screen" class="hidden">
    <div class="setup-logo">🚀</div>
    <div class="setup-title">Yoyo 成長監控</div>
    <div class="setup-subtitle">開始記錄你的每一步成長</div>

    <div class="setup-avatar-area">
      <div class="setup-avatar-circle" id="setup-avatar-preview">👤</div>
      <button type="button" class="btn btn-outline btn-sm" id="setup-avatar-btn">上傳頭像（選填）</button>
      <input type="file" id="setup-avatar-input" accept="image/*" style="display:none">
    </div>

    <form id="setup-form" style="width:100%">
      <div class="form-group">
        <label class="form-label">你的名字</label>
        <input class="form-input" id="setup-name" placeholder="Yoyo" maxlength="20" required autocomplete="name">
      </div>
      <button type="submit" class="btn btn-primary">開始成長！🎯</button>
    </form>
  </div>

  <!-- ── Main app ── -->
  <div id="main-app" class="hidden">

    <!-- Header: level + XP bar -->
    <header id="header">
      <div class="hdr-level-badge" onclick="window.navigate('profile')">
        <span class="hdr-lv-label">Lv.</span><span id="hdr-level">1</span>
      </div>
      <div class="hdr-xp-section">
        <div class="hdr-xp-top">
          <span id="hdr-title" class="hdr-title">初心者</span>
          <span id="hdr-xp-text" class="hdr-xp-text">0 / 120 XP</span>
        </div>
        <div class="xp-bar-track">
          <div class="xp-bar-fill" id="hdr-xp-fill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main id="content"></main>

    <!-- Bottom navigation (5 tabs) -->
    <nav id="nav">
      <button class="nav-item active" data-page="home" onclick="window.navigate('home')">
        <span class="nav-icon">🏠</span>今日
      </button>
      <button class="nav-item" data-page="goals" onclick="window.navigate('goals')">
        <span class="nav-icon">📋</span>紀錄
      </button>
      <button class="nav-item" data-page="review" onclick="window.navigate('review')">
        <span class="nav-icon">📊</span>週回顧
      </button>
      <button class="nav-item" data-page="profile" onclick="window.navigate('profile')">
        <span class="nav-icon">👤</span>個人
      </button>
      <button class="nav-item" data-page="settings" onclick="window.navigate('settings')">
        <span class="nav-icon">⚙️</span>設定
      </button>
    </nav>
  </div>

  <!-- ── Focus timer overlay ── -->
  <div id="focus-overlay" class="hidden">
    <div class="focus-box">
      <div class="focus-task-header">
        <span id="focus-task-emoji" class="focus-task-emoji">🎯</span>
        <span id="focus-task-name" class="focus-task-name">任務名稱</span>
      </div>
      <div id="focus-timer" class="focus-timer">00:00</div>
      <div id="focus-min-effective" class="focus-min-pending">最低有效時間計算中…</div>
      <button id="focus-end-btn" class="btn btn-primary focus-end-btn" onclick="window.endFocus()">
        結束專注
      </button>
    </div>
  </div>

  <!-- ── Level-up overlay ── -->
  <div id="levelup-overlay" class="hidden">
    <div class="levelup-box">
      <div class="lu-stars">✨⭐✨</div>
      <div class="lu-label">LEVEL UP！</div>
      <div class="lu-number" id="lu-level">2</div>
      <div class="lu-title" id="lu-title">探索者</div>
      <button class="btn btn-primary" onclick="window.closeLevelUp()" style="margin-top:24px;max-width:200px">繼續前進 🚀</button>
    </div>
  </div>

</div>

<script type="module" src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
